{% extends "base.html" %}
{% block title %}Users{% endblock %}
{% block nav_users %}bg-gray-900 text-white{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-gray-900">Users</h1>
    <span class="text-sm text-gray-500">{{ total }} total</span>
</div>

<div class="mb-5">
    <form hx-get="/users" hx-target="#users-table" hx-swap="innerHTML" class="flex gap-3">
        <input type="text" name="telegram_id" value="{{ telegram_id }}" placeholder="Search by Telegram ID"
               class="rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-indigo-500 focus:ring-indigo-500 focus:outline-none w-64">
        <button type="submit"
                class="rounded-lg bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-500 transition-colors">
            Search
        </button>
        {% if telegram_id %}
        <a href="/users"
           class="rounded-lg border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors">
            Clear
        </a>
        {% endif %}
    </form>
</div>

<div id="users-table">
    {% include "users/_table.html" %}
</div>
{% endblock %}
