<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin{% endblock %} — VPN Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="h-full">
<div class="flex h-full">
    <aside class="w-64 bg-gray-800 text-gray-100 flex flex-col flex-shrink-0 min-h-screen">
        <div class="px-6 py-5 border-b border-gray-700">
            <h1 class="text-xl font-bold tracking-tight">VPN Admin</h1>
        </div>
        <nav class="flex-1 px-4 py-4 space-y-1">
            <a href="/dashboard" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium hover:bg-gray-700 transition-colors {% block nav_dashboard %}{% endblock %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0h4"/></svg>
                Dashboard
            </a>
            <a href="/users" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium hover:bg-gray-700 transition-colors {% block nav_users %}{% endblock %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
                Users
            </a>
            <a href="/plans" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium hover:bg-gray-700 transition-colors {% block nav_plans %}{% endblock %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
                Plans
            </a>
            <a href="/orders" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium hover:bg-gray-700 transition-colors {% block nav_orders %}{% endblock %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                Orders
            </a>
            <a href="/subscriptions" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium hover:bg-gray-700 transition-colors {% block nav_subscriptions %}{% endblock %}">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"/></svg>
                Subscriptions
            </a>
        </nav>
        <div class="px-4 py-4 border-t border-gray-700">
            <a href="/logout" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm font-medium text-gray-400 hover:bg-gray-700 hover:text-white transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                Logout
            </a>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto">
        <div class="px-8 py-6">
            {% block content %}{% endblock %}
        </div>
    </main>
</div>
</body>
</html>
