{% extends "base.html" %}
{% block title %}Orders{% endblock %}
{% block nav_orders %}bg-gray-900 text-white{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-gray-900">Orders</h1>
    <span class="text-sm text-gray-500">{{ total }} total</span>
</div>

<div class="mb-5">
    <form hx-get="/orders" hx-target="#orders-table" hx-swap="innerHTML" class="flex gap-3 items-center">
        <select name="status"
                class="rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:border-indigo-500 focus:ring-indigo-500 focus:outline-none"
                onchange="this.form.requestSubmit()">
            <option value="">All statuses</option>
            <option value="pending" {% if status == 'pending' %}selected{% endif %}>Pending</option>
            <option value="paid" {% if status == 'paid' %}selected{% endif %}>Paid</option>
            <option value="failed" {% if status == 'failed' %}selected{% endif %}>Failed</option>
            <option value="cancelled" {% if status == 'cancelled' %}selected{% endif %}>Cancelled</option>
        </select>
    </form>
</div>

<div id="orders-table">
    {% include "orders/_table.html" %}
</div>
{% endblock %}
