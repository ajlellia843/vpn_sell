global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "api-gateway"
    static_configs:
      - targets: ["api-gateway:8000"]
    metrics_path: /metrics

  - job_name: "user-service"
    static_configs:
      - targets: ["user-service:8000"]
    metrics_path: /metrics

  - job_name: "billing-service"
    static_configs:
      - targets: ["billing-service:8000"]
    metrics_path: /metrics

  - job_name: "vpn-service"
    static_configs:
      - targets: ["vpn-service:8000"]
    metrics_path: /metrics

  - job_name: "admin-service"
    static_configs:
      - targets: ["admin-service:8000"]
    metrics_path: /metrics

  - job_name: "bot-service"
    static_configs:
      - targets: ["bot-service:8080"]
    metrics_path: /metrics
